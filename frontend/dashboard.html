<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — Knight Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>Knight Bot</span>
            </div>
            <nav>
                <a href="/">Главная</a>
                <a href="/dashboard" class="active">Панель</a>
                <span id="userInfo">
                    <img id="userAvatar" src="" alt="Avatar">
                    <span id="userName"></span>
                </span>
                <a href="/auth/logout" class="btn-danger-small">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </nav>
        </header>

        <div class="dashboard-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h4>Сервера</h4>
                    <div id="guildsList">
                        <p class="loading">Загрузка...</p>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h4>Быстрые действия</h4>
                    <button class="sidebar-btn" id="inviteGuildBtn">
                        <i class="fas fa-plus"></i> Пригласить бота
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div id="guildDashboard">
                    <div class="card">
                        <h3>👋 Выберите сервер слева для управления</h3>
                        <p>Выберите сервер, чтобы начать настройку</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
