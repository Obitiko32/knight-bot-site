<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель — Knight Bot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="logo">
                <i class="fas fa-robot"></i>
                Knight Bot
            </a>
            <nav>
                <a href="/">Главная</a>
                <a href="/dashboard" class="active">Панель</a>
                <span id="userInfo">
                    <img id="userAvatar" src="" alt="Avatar">
                    <span id="userName"></span>
                </span>
                <a href="/auth/logout" class="btn-danger-small">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </a>
            </nav>
        </header>

        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h4><i class="fas fa-server"></i> Сервера</h4>
                    <div id="guildsList">
                        <p class="loading">Загрузка...</p>
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <div id="guildDashboard">
                    <div class="card">
                        <h3><i class="fas fa-arrow-left"></i> Выберите сервер</h3>
                        <p>Выберите сервер из списка слева, чтобы начать управление.</p>
                    </div>
                </div>
            </main>
        </div>

        <footer>
            <p>Knight Bot — <span class="heart">❤️</span> Сделано с любовью для Discord</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
