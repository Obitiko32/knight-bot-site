services:
  - type: web
    name: knight-bot-site
    runtime: node
    repo: https://github.com/твой-логин/discord-bot-site
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: REDIRECT_URI
        value: https://knight-bot-site.onrender.com/auth/discord/callback
      - key: SITE_URL
        value: https://knight-bot-site.onrender.com
      - key: NODE_ENV
        value: production